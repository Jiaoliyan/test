<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceci&Shower</title>
    <style>
        :root {
            /* 改进：降低背景不透明度 (0.15 -> 0.08)，让图片更清晰 */
            --glass-bg: rgba(255, 255, 255, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* 背景图 (确保仓库里有 bg.jpg) */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 85%;
        }

        /* 顶部区域：番茄钟 */
        .pomodoro-box {
            margin-bottom: 30px;
        }

        .pomo-label {
            font-size: 1.1em;
            color: rgba(255,255,255,0.7);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .pomo-time {
            font-size: 5.5em; /* 稍微调小一点，更有呼吸感 */
            font-weight: 200;
            margin: 10px 0;
            font-family: 'Helvetica Neue', sans-serif;
        }

        .btn-group button {
            padding: 10px 30px;
            font-size: 0.95em;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 50px;
            margin: 0 8px;
            background: transparent;
            color: white;
            transition: all 0.3s;
        }

        .btn-group button:hover {
            background: white;
            color: #333;
        }

        /* 底部区域：倒计时 */
        .countdown-box {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        h2 { 
            font-size: 0.85em; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            opacity: 0.6; 
            margin-bottom: 10px;
        }

        /* 改进：倒计时字体改小 (2em -> 1.1em) */
        .timer-display {
            font-size: 1.1em; 
            font-weight: 400;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }

    </style>
</head>
<body>

<div class="glass-container">
    <div class="pomodoro-box">
        <div class="pomo-label">FOCUS</div>
        <div class="pomo-time" id="pomo-display">25:00</div>
        <div class="btn-group">
            <button id="pomo-btn" onclick="togglePomo()">开始</button>
            <button onclick="resetPomo()">重置</button>
        </div>
    </div>

    <div class="countdown-box">
        <h2>COUNTDOWN TO 05.09</h2>
        <div class="timer-display" id="meeting-timer">00天 00时 00分 00秒</div>
    </div>
</div>

<script>
    // --- 倒计时逻辑 (目标日期 2026-05-09) ---
    const targetDate = new Date("2026-05-09 00:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const gap = targetDate - now;

        if (gap <= 0) {
            document.getElementById("meeting-timer").innerText = "见面日到了！💓";
            return;
        }

        const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
        const d = Math.floor(gap / day);
        const h = Math.floor((gap % day) / hour);
        const m = Math.floor((gap % hour) / minute);
        const s = Math.floor((gap % minute) / second);

        document.getElementById("meeting-timer").innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
    }
    setInterval(updateCountdown, 1000);

    // --- 番茄钟逻辑 ---
    let pomoTime = 25 * 60;
    let pomoInterval = null;
    let isRunning = false;

    function togglePomo() {
        const btn = document.getElementById('pomo-btn');
        if (isRunning) {
            clearInterval(pomoInterval);
            btn.innerText = "继续";
            isRunning = false;
        }else {
            isRunning = true;
            btn.innerText = "暂停";
            pomoInterval = setInterval(() => {
                pomoTime--;
                updatePomoDisplay();
                if (pomoTime <= 0) {
                    clearInterval(pomoInterval);
                    alert("专注完成！");
                    resetPomo();
                }
            }, 1000);
        }
    }

    function resetPomo() {
        clearInterval(pomoInterval);
        pomoTime = 25 * 60;
        isRunning = false;
        document.getElementById('pomo-btn').innerText = "开始";
        updatePomoDisplay();
    }

    function updatePomoDisplay() {
        const mins = Math.floor(pomoTime / 60);
        const secs = pomoTime % 60;
        document.getElementById('pomo-display').innerText = 
            `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
    updateCountdown(); // 立即执行一次
</script>

</body>
</html>
